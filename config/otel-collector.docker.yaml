# Used by docker-compose.otel.yml — endpoint and key come from your .env file.

receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch: {}

exporters:
  otlphttp/pulse:
    endpoint: ${env:PULSE_OTLP_ENDPOINT}
    compression: gzip
    tls:
      insecure: true
    headers:
      x-pulse-ingest-key: "${env:PULSE_INGEST_API_KEY}"

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/pulse]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/pulse]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/pulse]
